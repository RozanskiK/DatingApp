<div class="flex w-full gap-6 min-h-100">
  <div class="flex items-center gap-4 w-2/3">
    <label
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      [class.border-purple-500]="isDragging"
      [class.border-dashed]="true"
      [class.border-opacity-50]="!isDragging"
      for="dropzone-file"
      class="flex flex-col justify-center items-center w-full border-2 border-gray-300 h-full rounded-lg cursor-pointer hover:bg-base-200 transition-colors"
    >
      <span class="mb-2 text-sm text-gray-500">Click to upload or drag and drop</span>

      <input type="file" id="dropzone-file" class="hidden" />
    </label>
  </div>
  @if (imageSrc()) {
    <div class="flex flex-col w-1/3 gap-3">
      <div class="flex justify-center border-2 border-gray-300 rounded-lg">
        <img [src]="imageSrc()" alt="image preview" class="w-full h-full object-cover" />
      </div>
      <div class="flex w-full gap-3">
        <button (click)="onCancel()" class="btn flex-1">Cancel</button>
        <button (click)="onUploadFile()" class="btn btn-primary flex-1" [disabled]="loading()">
          @if (loading()) {
            <span class="loading loading-spinner"></span>
          }
          Upload image
        </button>
      </div>
    </div>
  }
</div>
